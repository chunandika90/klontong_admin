version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: klontong_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: klontong
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d klontong']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: klontong_backend
    restart: unless-stopped
    ports:
      - '4001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: klontong
      JWT_SECRET: docker-dev-secret-change-in-prod
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:4000,http://localhost:3000
      DB_SYNC: 'true'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/health 2>/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: klontong_frontend
    restart: unless-stopped
    ports:
      - '4000:3000'
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:4001/api
      NUXT_API_BASE_SERVER: http://klontong_backend:3001/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
